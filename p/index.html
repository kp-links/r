<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>リダイレクト中...</title>
  <script>
    (function () {
      var urls = [
        { url: "https://www.amazon.co.jp/s/?keywords=%E3%83%9B%E3%83%AF%E3%82%A4%E3%83%88%E3%83%8B%E3%83%B3%E3%82%B0&ie=UTF8&field-asin=B0F8VLBZDQ&rh=i:aps,ssx:relevance", weight: 75 },
        { url: "https://www.amazon.co.jp/s/?keywords=%E3%83%9B%E3%83%AF%E3%82%A4%E3%83%88%E3%83%8B%E3%83%B3%E3%82%B0%E3%82%B7%E3%83%BC%E3%83%88&ie=UTF8&field-asin=B0F8VLBZDQ&rh=i:aps,ssx:relevance", weight: 25 }
      ];
      var rand = Math.random() * 100;
      var cumulative = 0;
      for (var i = 0; i < urls.length; i++) {
        cumulative += urls[i].weight;
        if (rand < cumulative) {
          window.location.replace(urls[i].url);
          break;
        }
      }
    })();
  </script>
</head>
<body><p>リダイレクト中...</p></body>
</html>
