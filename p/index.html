<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>リダイレクト中...</title>
  <script>
    (function () {
      var urls = [
        { url: "https://www.amazon.co.jp/s/?keywords=香水&ie=UTF8&field-asin=B0F8VV4FF2&rh=i:aps,ssx:relevance", weight: 65 },
        { url: "https://www.amazon.co.jp/s/?keywords=香水+メンズ&ie=UTF8&field-asin=B0F8VV4FF2&rh=i:aps,ssx:relevance", weight: 20 },
        { url: "https://www.amazon.co.jp/s/?keywords=香水+レディース&ie=UTF8&field-asin=B0F8VV4FF2&rh=i:aps,ssx:relevance", weight: 15 }
      ];
      var rand = Math.random() * 100;
      var cumulative = 0;
      for (var i = 0; i < urls.length; i++) {
        cumulative += urls[i].weight;
        if (rand < cumulative) {
          window.location.replace(urls[i].url);
          break;
        }
      }
    })();
  </script>
</head>
<body><p>リダイレクト中...</p></body>
</html>
