<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>リダイレクト中...</title>
  <script>
    (function () {
      var urls = [
        { url: "https://www.amazon.co.jp/s/?keywords=%E3%82%8F%E3%81%8D%E3%81%8C%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%A0&ie=UTF8&field-asin=B0FVM5832C&rh=i:aps,ssx:relevance", weight: 40 },
        { url: "https://www.amazon.co.jp/s/?keywords=%E3%83%AF%E3%82%AD%E3%82%AC&ie=UTF8&field-asin=B0FVM5832C&rh=i:aps,ssx:relevance", weight: 40 },
        { url: "https://www.amazon.co.jp/s/?keywords=%E8%84%87%20%E3%83%87%E3%82%AA%E3%83%89%E3%83%A9%E3%83%B3%E3%83%88&ie=UTF8&field-asin=B0FVM5832C&rh=i:aps,ssx:relevance", weight: 20 }
      ];
      var rand = Math.random() * 100;
      var cumulative = 0;
      for (var i = 0; i < urls.length; i++) {
        cumulative += urls[i].weight;
        if (rand < cumulative) {
          window.location.replace(urls[i].url);
          break;
        }
      }
    })();
  </script>
</head>
<body><p>リダイレクト中...</p></body>
</html>
